<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivBuddy - Sign On</title>
    <link rel="stylesheet" href="/css/98.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>
<body class="login-page">
    <div class="aol-login-container">
        <div class="running-man-login">🏃</div>
        <div class="aol-logo">CivBuddy</div>
        <div class="aol-subtitle">I N S T A N T &nbsp; M E S S E N G E R</div>

        <div class="login-box window">
            <div class="title-bar">
                <div class="title-bar-text">Sign On</div>
            </div>
            <div class="window-body">
                <form id="login-form">
                    <div class="login-field">
                        <label for="username">Screen Name</label>
                        <input type="text" id="username" autocomplete="username" autofocus>
                    </div>
                    <div class="login-field">
                        <label for="password">Password</label>
                        <input type="password" id="password" autocomplete="current-password">
                    </div>
                    <div class="login-buttons">
                        <button type="submit">Sign On</button>
                    </div>
                    <div class="login-error" id="login-error"></div>
                </form>
            </div>
        </div>
    </div>

    <!-- Connecting overlay -->
    <div class="connecting-overlay" id="connecting-overlay">
        <div class="connecting-box window">
            <div class="title-bar">
                <div class="title-bar-text">CivBuddy - Connecting</div>
            </div>
            <div class="window-body">
                <ul class="connect-steps" id="connect-steps">
                    <li>Locating AOL host...</li>
                    <li>Requesting network attention...</li>
                    <li>Verifying screen name and password...</li>
                    <li>Starting services...</li>
                    <li>Connecting to CivBuddy...</li>
                </ul>
                <div class="connect-progress">
                    <progress id="connect-progress" max="100" value="0" style="width:100%"></progress>
                </div>
                <div class="connect-cancel">
                    <button id="connect-cancel-btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="snd-dialup" preload="auto" src="/sounds/dialup.mp3"></audio>

    <script src="/js/auth.js"></script>
    <script src="/js/dialup.js"></script>
</body>
</html>
